<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python to Flowchart</title>
    
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        window.mermaid = mermaid; // Make it available to our script
    </script>

    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        #flowchart-container { margin-top: 30px; padding: 20px; border: 1px solid #ccc; min-height: 200px; text-align: center; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>Python to Flowchart Generator</h1>
    <p>Enter the Python CODE you wanna de-CODE. . .</p>

    <textarea id="python-code">
def check_even_odd(number):
    if number % 2 == 0:
        print("Even")
    else:
        print("Odd")
    </textarea>
    <br>
    <button onclick="generateFlowchart()">Generate Flowchart</button>

    <div id="flowchart-container">
        <i>Your flowchart will appear here...</i>
    </div>

    <script>
        async function generateFlowchart() {
            const codeInput = document.getElementById('python-code').value;
            const container = document.getElementById('flowchart-container');
            
            container.innerHTML = "<i>Thinking... Generating flowchart...</i>";

            try {
                // 1. Send the code to your FastAPI Backend
                const response = await fetch('http://127.0.0.1:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: codeInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Something went wrong on the server.");
                }

                // 2. Clear the container and insert the raw Mermaid text
                container.innerHTML = `<pre class="mermaid">${data.mermaid_syntax}</pre>`;

                // 3. Tell Mermaid.js to scan the container and draw the graph!
                await window.mermaid.run({
                    querySelector: '.mermaid'
                });

            } catch (error) {
                container.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>

</body>
</html>
